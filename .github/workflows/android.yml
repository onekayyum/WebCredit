name: Build APK

on:
  push:
    branches:
      - newreview-branch-for-improvements-and-fixes

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install

      - name: Install frontend dependencies
        run: |
          cd src/frontend
          npm install

      - name: Build frontend
        run: |
          cd src/frontend
          npm run build

      - name: Install Capacitor
        run: |
          npm install @capacitor/cli
          npm install @capacitor/android

      - name: Sync Capacitor
        run: |
          cd src/frontend
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        run: |
          cd src/frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: src/frontend/android/app/build/outputs/apk/debug/app-debug.apk
